<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="weather-card">

            <!-- Search Box -->
            <div class="search-box">
                <input type="text" placeholder="Enter city name..." id="location"/>
                <button>🔍</button>
            </div>

            <!-- Weather Info -->
            <div class="weather-info">
                <img src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png" alt="weather icon" class="weather-icon">

                <h1 class="temperature">25°C</h1>
                <h2 class="city">Jamshedpur</h2>

                <div class="details">
                    <div class="col">
                        <p>💧 Humidity</p>
                        <span id="humidity">60%</span>
                    </div>
                    <div class="col">
                        <p>🌬️ Wind</p>
                        <span  id="wind">10 km/h</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="./weather.js"></script>
</body>
</html>
